name: 부목자 월간 모임 알림

on:
  # 매주 월요일 09:30 KST (00:30 UTC) 실행, 넷째 주 주일 주간에만 발송
  schedule:
    - cron: '30 0 * * 1'
  # 수동 테스트용
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Send submokja meeting reminder email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python volunteer-reminder/submokja_reminder.py
