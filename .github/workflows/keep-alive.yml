name: Keep Alive

on:
  schedule:
    # 매주 월요일 00:00 UTC (한국시간 09:00)
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Push empty commit to prevent Actions cron deactivation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keep-alive empty commit [skip ci]"
          git push
