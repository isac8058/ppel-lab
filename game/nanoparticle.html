<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>나노입자 피하기</title>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background-color: #222; touch-action: none; }
    canvas { display: block; width: 100vw; height: 100vh; background-color: #f4f4f9; }
    #score {
      position: absolute; top: 20px; left: 20px;
      font-size: 24px; font-weight: bold; font-family: sans-serif;
      color: #333;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="score">점수: 0</div>
  <canvas id="gameCanvas"></canvas>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      // BUG FIX: player.x must follow canvas width on resize
      if (player) player.x = canvas.width * 0.2;
    }

    let score = 0;
    let gameFrame = 0;
    let gameOver = false;
    let animationId = null; // BUG FIX: track RAF id to prevent duplicate loops

    const player = {
      x: 0,
      y: 0,
      radius: 15,
      dy: 0,
      gravity: 0.5,
      jumpPower: -8,
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#007BFF';
        ctx.fill();
        ctx.closePath();
      },
      update() {
        this.dy += this.gravity;
        this.y += this.dy;
        if (this.y + this.radius > canvas.height || this.y - this.radius < 0) {
          gameOver = true;
        }
        this.draw();
      },
      jump() { this.dy = this.jumpPower; }
    };

    const obstacles = [];
    const obstacleWidth = 60;
    const gap = 200;

    function handleObstacles() {
      // BUG FIX: skip spawning at frame 0 so player has reaction time on (re)start
      if (gameFrame > 0 && gameFrame % 120 === 0) {
        const topHeight = Math.random() * (canvas.height - gap - 100) + 50;
        obstacles.push({
          x: canvas.width,
          top: topHeight,
          bottom: canvas.height - topHeight - gap,
          passed: false
        });
      }
      for (let i = 0; i < obstacles.length; i++) {
        const obs = obstacles[i];
        obs.x -= 3;
        ctx.fillStyle = '#555';
        ctx.fillRect(obs.x, 0, obstacleWidth, obs.top);
        ctx.fillRect(obs.x, canvas.height - obs.bottom, obstacleWidth, obs.bottom);

        if (player.x + player.radius > obs.x &&
            player.x - player.radius < obs.x + obstacleWidth) {
          if (player.y - player.radius < obs.top ||
              player.y + player.radius > canvas.height - obs.bottom) {
            gameOver = true;
          }
        }
        if (obs.x + obstacleWidth < player.x && !obs.passed) {
          score++;
          obs.passed = true;
          scoreEl.innerText = '점수: ' + score;
        }
      }
      while (obstacles.length > 0 && obstacles[0].x < -obstacleWidth) {
        obstacles.shift();
      }
    }

    function drawGameOver() {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'white';
      ctx.textAlign = 'center';
      ctx.font = 'bold 40px sans-serif';
      ctx.fillText('게임 오버', canvas.width / 2, canvas.height / 2 - 40);
      // BUG FIX: show final score on game over screen
      ctx.font = 'bold 28px sans-serif';
      ctx.fillText('점수: ' + score, canvas.width / 2, canvas.height / 2 + 5);
      ctx.font = '20px sans-serif';
      ctx.fillText('화면 터치로 재시작', canvas.width / 2, canvas.height / 2 + 50);
    }

    function animate() {
      animationId = null;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      player.update();
      // BUG FIX: stop processing obstacles in the death frame so no extra
      // obstacle spawns or score increments after gameOver flips to true
      if (!gameOver) {
        handleObstacles();
        gameFrame++;
      } else {
        // still draw existing obstacles for context, but don't move/score them
        ctx.fillStyle = '#555';
        for (const obs of obstacles) {
          ctx.fillRect(obs.x, 0, obstacleWidth, obs.top);
          ctx.fillRect(obs.x, canvas.height - obs.bottom, obstacleWidth, obs.bottom);
        }
        drawGameOver();
        return;
      }
      animationId = requestAnimationFrame(animate);
    }

    function resetGame() {
      // BUG FIX: cancel any pending frame so we never have two animate loops
      if (animationId !== null) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
      player.x = canvas.width * 0.2;
      player.y = canvas.height / 2;
      player.dy = 0;
      obstacles.length = 0;
      score = 0;
      gameFrame = 0;
      gameOver = false;
      scoreEl.innerText = '점수: 0';
      animate();
    }

    // BUG FIX: debounce input so a single tap doesn't fire both touchstart
    // and the synthesized mousedown event (double jump / double reset)
    let lastInputAt = 0;
    function handleInput() {
      const now = performance.now();
      if (now - lastInputAt < 100) return;
      lastInputAt = now;
      if (gameOver) resetGame();
      else player.jump();
    }

    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', resize);
    window.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleInput();
    }, { passive: false });
    window.addEventListener('mousedown', handleInput);

    resize();
    player.y = canvas.height / 2;
    animate();
  </script>
</body>
</html>
